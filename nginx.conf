events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    gzip          on;
    gzip_types    text/plain text/css application/json application/javascript text/xml application/xml;

    upstream backend {
        server backend:8000;
    }

    upstream frontend {
        server frontend:80;
    }

    server {
        listen 80;
        server_name bahrombek.uz www.bahrombek.uz _;

        # Let's Encrypt challenge
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Backend API proxy
        location /api/ {
            proxy_pass http://backend/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            client_max_body_size 25M;
        }

        # Uploaded files (avatar, PDF, resume)
        location /uploads/ {
            proxy_pass http://backend/uploads/;
            proxy_set_header Host $host;
        }

        # Frontend (Vue SPA)
        location / {
            proxy_pass http://frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }

    # HTTPS (uncomment after certbot)
    # server {
    #     listen 443 ssl;
    #     server_name bahrombek.uz www.bahrombek.uz;
    #
    #     ssl_certificate     /etc/letsencrypt/live/bahrombek.uz/fullchain.pem;
    #     ssl_certificate_key /etc/letsencrypt/live/bahrombek.uz/privkey.pem;
    #
    #     location /api/ {
    #         proxy_pass http://backend/;
    #         client_max_body_size 25M;
    #     }
    #
    #     location / {
    #         proxy_pass http://frontend;
    #     }
    # }
}
